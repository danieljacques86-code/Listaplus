<meta charset="UTF-8">

<title>SS IPTV Portal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
    color: white;
}

body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    background-size: cover;
    position: relative;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url("https://wsbit.net/core/img/fundo.png") center/cover;
    opacity: 0.3;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    gap: 60px;
}

/* HEADER SS IPTV */
.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    font-size: clamp(28px, 6vw, 48px);
    background: linear-gradient(45deg, #00d4ff, #0099cc, #0077aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    letter-spacing: 3px;
    margin-bottom: 10px;
    font-weight: 900;
}

.header p {
    font-size: clamp(14px, 2vw, 18px);
    opacity: 0.9;
    letter-spacing: 1px;
}

/* MENU PRINCIPAL - GRID 3 COLUNAS */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(25px, 4vw, 45px);
    max-width: 1200px;
    width: 100%;
    justify-items: center;
}

.menu-item {
    aspect-ratio: 1;
    width: 100%;
    max-width: 220px;
    background: rgba(0, 0, 0, 0.85);
    border: 3px solid rgba(0, 212, 255, 0.3);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.menu-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}

.menu-item:hover::before {
    left: 100%;
}

.menu-item:hover {
    transform: translateY(-15px) scale(1.05);
    border-color: #00d4ff;
    box-shadow: 0 25px 50px rgba(0, 212, 255, 0.3);
    background: rgba(0, 50, 100, 0.95);
}

.menu-item img {
    width: clamp(70px, 18vw, 120px);
    height: auto;
    margin-bottom: 12px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

.menu-item span {
    font-size: clamp(12px, 2vw, 16px);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-align: center;
    padding: 0 10px;
}

/* RODAPÉ - 2 ITENS */
.footer-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(30px, 5vw, 50px);
    max-width: 600px;
    width: 100%;
}

.footer-item {
    aspect-ratio: 16/9;
    width: 100%;
    max-width: 280px;
    background: rgba(0, 0, 0, 0.8);
    border: 2px solid rgba(0, 212, 255, 0.25);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.footer-item:hover {
    transform: scale(1.08);
    border-color: #00d4ff;
    box-shadow: 0 20px 40px rgba(0, 212, 255, 0.25);
    background: rgba(0, 50, 100, 0.9);
}

.footer-item img {
    width: clamp(45px, 6vw, 65px);
    margin-bottom: 8px;
}

.footer-item span {
    font-size: clamp(11px, 1.8vw, 14px);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* RESPONSIVO */

/* TV / MONITOR */
@media (min-width: 1280px) {
    .menu-grid {
        gap: 50px;
    }
    
    .menu-item {
        max-width: 260px;
    }
    
    .menu-item img {
        width: 140px;
    }
    
    .header h1 {
        font-size: 52px;
    }
}

/* TABLET */
@media (max-width: 1024px) {
    .menu-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 30px;
    }
    
    .footer-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* CELULAR */
@media (max-width: 768px) {
    .container {
        gap: 40px;
        padding: 15px;
    }
    
    .menu-grid {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    .footer-grid {
        grid-template-columns: 1fr;
        gap: 25px;
        max-width: 300px;
    }
    
    .header h1 {
        font-size: 32px;
        letter-spacing: 2px;
    }
}

/* CELULAR MUITO PEQUENO */
@media (max-width: 480px) {
    .menu-grid {
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }
    
    .menu-item {
        max-width: none;
    }
    
    .footer-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
}
</style>
</head>
