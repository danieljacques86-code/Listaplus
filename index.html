<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* FUNDO */
body {
    background: url("https://wsbit.net/core/img/fundo.png") no-repeat center center fixed;
    background-size: cover;
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
    z-index: 1;
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* MENU */
.menu {
    display: flex;
    gap: clamp(30px, 3vw, 80px);
    flex-wrap: wrap;
    justify-content: center;
}

/* ITENS PRINCIPAIS */
.item {
    width: clamp(160px, 22vw, 260px);
    height: clamp(160px, 22vw, 260px);
    background: rgba(0,0,0,0.45);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.item:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(0,120,255,0.8);
}

.item img {
    width: clamp(90px, 14vw, 190px);
}

/* RODAPÉ */
.footer {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: clamp(40px, 6vw, 60px);
}

.footer .small {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.footer img {
    width: clamp(45px, 6vw, 70px);
}

.footer span {
    margin-top: 6px;
    color: white;
    font-size: clamp(11px, 1.8vw, 14px);
}

a {
    text-decoration: none;
}

/* 📱 CELULAR PEQUENO (RETRATO) */
@media (max-width: 480px) {
    .container {
    justify-content: space-between;
    padding-top: 70px;  /* Altura das imagens */
    padding-bottom: 65px;
    }

    .menu {
        gap: 20px;  /* Distancia entre as imagens */
    }

    .item img {
        width: 120px; /* Tamanho das imagens */
    }

    .footer img {
        width: 60px;  /* Tamanho das imagens Rodapé */
    }

    .footer {
        bottom: 40px;  /* Altura das imagens Rodapé */
        gap: 40px;  /* Distancia entre as imagens */
    }
}

/* 📱 CELULAR PEQUENO DEITADO (ALTURA REALMENTE CURTA) */
@media (max-height: 500px) and (orientation: landscape) {

    .container {
        justify-content: space-between;
        padding-top: 60px;  /* Altura das imagens */
        padding-bottom: 65px;
    }

    .menu {
        gap: 40px; /* Distancia entre as imagens */
    }

    .item {
        width: 120px; /* circulo das imagens */
        height: 120px;
    }

    .item img {
        width: 120px; /* Tamanho das imagens */
    }

    .footer {
        bottom: 28px; /* Altura das imagens Rodapé */
        gap: 40px; /* Distancia entre as imagens */
    }

    .footer img {
        width: 58px; /* Tamanho das imagens Rodapé */
    }

    .footer span {
        font-size: 11px; /* Tamanho das Letras Rodapé */
    }
}

/* 📺 SMART TV / TV BOX GRANDES */
@media (min-width: 1280px) {
    .container {
        justify-content: flex-start; /* topo */
        align-items: center;         /* centro horizontal */
    }

    .menu {
        width: 100%;
        display: flex;
        justify-content: center;     /* centro real */
        margin-top: 22vh;
    }

    .menu .item {
        margin: 0 2vw;  /* Distancia entre as imagens */
    }

    .footer .small {
        margin: 0 5vw; /* Distancia entre as imagens Rodapé */
    }

    .item {
        width: 280px; /* circulo das imagens */
        height: 280px;
    }

    .item img {
        width: 220px; /* Tamanho das imagens */
    }

    .footer img {
        width: 80px; /* Tamanho das imagens Rodapé */
    }
}
</style>
